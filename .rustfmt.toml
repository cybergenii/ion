# Rust formatting — options compatible with stable rustfmt (matches CI).
# Nightly-only options (wrap_comments, imports_granularity, group_imports, etc.)
# were removed so `cargo fmt --check` on stable does not warn or diverge.
edition = "2021"
max_width = 100
hard_tabs = false
tab_spaces = 4
newline_style = "Unix"
use_small_heuristics = "Default"
reorder_imports = true
reorder_modules = true
remove_nested_parens = true
