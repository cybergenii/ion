name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build · ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux (static musl) ──────────────────────────────────────────
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: ion-linux-x86_64
            use_cross: true

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: ion-linux-aarch64
            use_cross: true

          - target: armv7-unknown-linux-musleabihf
            os: ubuntu-latest
            artifact: ion-linux-armv7
            use_cross: true

          # ── macOS ────────────────────────────────────────────────────────
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: ion-macos-x86_64
            use_cross: false

          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: ion-macos-aarch64
            use_cross: false

          # ── Windows ──────────────────────────────────────────────────────
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: ion-windows-x86_64.exe
            use_cross: false

          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: ion-windows-aarch64.exe
            use_cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross — Linux musl)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native — macOS / Windows)
        if: matrix.use_cross == false
        run: cargo build --release --target ${{ matrix.target }}

      # ── Rename + package ────────────────────────────────────────────────
      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/ion ${{ matrix.artifact }}
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/ion.exe" "${{ matrix.artifact }}"
          Compress-Archive -Path "${{ matrix.artifact }}" -DestinationPath "${{ matrix.artifact }}.zip"

      # ── Upload ──────────────────────────────────────────────────────────
      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  # ── Create GitHub Release with all binaries ────────────────────────────
  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/checksums.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}